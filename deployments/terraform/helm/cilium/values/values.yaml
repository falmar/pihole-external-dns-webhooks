tf: 8081

# Global
image:
  pullPolicy: IfNotPresent
  useDigest: false

cluster:
  name: kubernetes

tls:
  secretsBackend: k8s

# Network
kubeProxyReplacement: true
k8sServicePort: 6443
k8sClientRateLimit:
  qps: 40
  burst: 150

ipam:
  mode: kubernetes

tunnelProtocol: vxlan
routingMode: tunnel
devices: eth+

bpf:
  # not working on kind
  #  masquerade: true
  tproxy: true

nodePort:
  enabled: true
externalIps:
  enabled: true
socketLB:
  enabled: true
enableLBIPAM: true
ciliumEndpointSlice:
  enabled: true
#l2announcements:
#  enabled: true

l7Proxy: true
loadBalancer:
  mode: snat
  l7:
    backend: envoy

# Ingress/Gateway API
gatewayAPI:
  enabled: true
  enableAppProtocol: true
  enableAlpn: true
  hostNetwork:
    enabled: true
  gatewayClass:
    create: "true"
#  secretsNamespace:
#    create: false
#    sync: true

# NodeInit
nodeinit:
  enabled: true

# Agent
rollOutCiliumPods: true

resources:
  limits:
    cpu: 1000m
    memory: 384Mi
  requests:
    cpu: 100m
    memory: 256Mi

# Operator
operator:
  image:
    pullPolicy: IfNotPresent
    useDigest: false

  replicas: 1
  rollOutPods: true
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists


# Hubble
hubble:
  enabled: false

  tls:
    enabled: false
    auto:
      enabled: false
      method: helm

  relay:
    enabled: false
    replicas: 1
    rollOutPods: false
    tolerations:
      - key: CriticalAddonsOnly
        operator: "Exists"

    tls:
      server:
        enabled: false

  ui:
    enabled: false
    rollOutPods: true
    standalone:
      enabled: true

    tolerations:
      - key: CriticalAddonsOnly
        operator: "Exists"

    backend:
      resources:
        requests:
          memory: 64Mi
          cpu: 10m
        limits:
          memory: 160Mi
          cpu: 100m
    frontend:
      resources:
        requests:
          memory: 16Mi
          cpu: 10m
        limits:
          memory: 32Mi
          cpu: 100m

# uninstall
#cni:
#  install: false
#  uninstall: true
#cleanState: true
#cleanBpfState: true
#sleepAfterInit: true
