image:
  repository: docker.io/pihole/pihole
  tag: latest
  pullPolicy: IfNotPresent

service:
  enabled: true
  port: 80
  annotations: { }

loadBalancer:
  enabled: true
  port: 53
  annotations: { }


httpRoute:
  enabled: true
  host: ~
  annotations: {}
  parent:
    name: ~
    namespace: ~
    sectionName: ~

storage:
  className: ~
  resources: {}

tolerations: []
affinity: {}

secret:
  name: ~
  key: ~

resources:
  requests:
    memory: 64Mi
    cpu: 50m
  limits:
    memory: 128Mi
    cpu: 500m
