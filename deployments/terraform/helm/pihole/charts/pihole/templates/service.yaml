apiVersion: v1
kind: Service
metadata:
  name: {{.Release.Name}}-{{.Chart.Name}}
  namespace: {{.Release.Namespace}}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 8 }}
  {{- end }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: pihole
    app.kubernetes.io/name: pihole
  ports:
    - port: 80
      protocol: TCP
      name: http
      targetPort: http
---
{{if .Values.loadBalancer.enabled}}
apiVersion: v1
kind: Service
metadata:
  name: {{.Release.Name}}-{{.Chart.Name}}-lb
  namespace: {{.Release.Namespace}}
  {{- with .Values.loadBalancer.annotations }}
  annotations:
  {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/component: pihole
    app.kubernetes.io/name: pihole
  ports:
    - port: {{.Values.loadBalancer.port}}
      protocol: UDP
      name: udp
      targetPort: udp
    - port: {{.Values.loadBalancer.port}}
      protocol: TCP
      name: tcp
      targetPort: tcp
{{end}}
---
