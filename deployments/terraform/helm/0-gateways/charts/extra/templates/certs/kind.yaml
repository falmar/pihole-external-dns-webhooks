{{if .Values.certificates.enabled}}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: "kind-local"
  namespace: "gateways"
spec:
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: extra-selfsigned-ci

  secretName: "kind-local-tls"
  commonName: kind.local
  dnsNames:
    - kind.local
    - "*.kind.local"
{{end}}
