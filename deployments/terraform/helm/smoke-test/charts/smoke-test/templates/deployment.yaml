apiVersion: apps/v1
kind: Deployment
metadata:
  name: smoke-test
  namespace: {{.Release.Name}}
  labels:
    app.kubernetes.io/name: "smoke-test"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: "smoke-test"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "smoke-test"
    spec:
      containers:
        - name: smoke-test
          image: docker.io/falmar/hostname
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
