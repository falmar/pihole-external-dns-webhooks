kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

networking:
  ipFamily: ipv4
  apiServerAddress: 127.0.0.1
  apiServerPort: 6443
  serviceSubnet: "10.80.0.0/16"
  podSubnet: "10.82.0.0/16"
  disableDefaultCNI: true
  kubeProxyMode: none

nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
      - containerPort: 443
        hostPort: 443
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            register-with-taints: "node.cilium.io/agent-not-ready=true:NoExecute"
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            register-with-taints: "node.cilium.io/agent-not-ready=true:NoExecute"
---
