version: "2"

run:
  tests: true

linters:
  default: standard
  enable:
    # Code quality
    - gocognit
    - gocyclo
    - funlen
    # Code style
    - misspell
    - godot
    # Security
    - gosec
    # Best practices
    - bodyclose
    - noctx
    - unconvert
    - errname
    - errorlint
    - wrapcheck
  exclusions:
    rules:
      # Exclude complexity checks from test files (tests can be long/complex by design)
      - linters:
          - gocyclo
          - gocognit
          - funlen
        path: _test\.go

formatters:
  enable:
    - gofmt
    - goimports
